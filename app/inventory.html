<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>物资库存 - 壳中灯</title>

  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <main class="shell">
    <section class="hero compact-hero">
      <div class="page-header-row">
        <div>
          <p class="eyebrow">INVENTORY MODULE</p>
          <h1>物资库存</h1>
          <p class="subtitle">先找得到，再谈活得好。编号、搜索、筛选和备份都在这里。</p>
        </div>

        <div class="page-actions">
          <a class="page-nav-button" href="/">返回总览</a>
        </div>
      </div>

      <p id="form-message" class="notice" style="display: none;"></p>
    </section>

    <section class="list-section">
      <div class="section-title-row">
        <h2>库存总览</h2>
        <button id="backup-button" class="small-button" type="button">备份数据库</button>
      </div>

      <div class="summary-grid">
        <button class="summary-card summary-action active" type="button" data-filter="all">
          <span>物资条目</span>
          <strong id="summary-total">0</strong>
        </button>

        <button class="summary-card summary-action" type="button" data-filter="category">
          <span>分类数量</span>
          <strong id="summary-category">0</strong>
        </button>

        <button class="summary-card summary-action" type="button" data-filter="soon">
          <span>30天内过期</span>
          <strong id="summary-soon">0</strong>
        </button>

        <button class="summary-card summary-action danger" type="button" data-filter="expired">
          <span>已过期</span>
          <strong id="summary-expired">0</strong>
        </button>
      </div>
    </section>

    <section class="list-section">
      <div class="section-title-row">
        <h2 id="inventory-list-title">当前库存</h2>
        <button id="clear-filter-button" class="small-button" type="button" style="display: none;">显示全部</button>
      </div>

      <div class="search-row">
        <input
          id="inventory-search"
          type="search"
          placeholder="搜索编号、名称、分类、备注，例如：LB-00012 / 电池 / 药品 / 客厅柜"
        />
        <button id="clear-search-button" class="small-button" type="button">清空搜索</button>
      </div>

      <div id="inventory-result-info" class="result-info">正在读取库存...</div>

      <div id="inventory-list" class="item-list">
        <p class="empty">正在读取库存...</p>
      </div>
    </section>

    <section class="list-section">
      <div class="section-title-row">
        <h2>新增物资</h2>
        <span class="section-hint">不需要每天填，补货或整理仓库时再用。</span>
      </div>

      <form id="inventory-form" class="form-card">
        <input
          name="name"
          placeholder="名称，例如：矿泉水"
          required
        />

        <input
          name="category"
          placeholder="分类，例如：水 / 食物 / 药品 / 电力 / 工具"
        />

        <input
          name="quantity"
          type="number"
          step="0.01"
          placeholder="数量，例如：12"
        />

        <input
          name="unit"
          placeholder="单位，例如：瓶 / 盒 / 个 / 升"
        />

        <input
          name="expire_date"
          placeholder="过期日期，例如：2027-01-01"
        />

        <textarea
          name="note"
          placeholder="备注，例如：放在客厅柜子第二层"
        ></textarea>

        <button type="submit">记录物资</button>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('inventory-form');
    const list = document.getElementById('inventory-list');
    const formMessage = document.getElementById('form-message');

    const backupButton = document.getElementById('backup-button');

    const summaryTotal = document.getElementById('summary-total');
    const summaryCategory = document.getElementById('summary-category');
    const summarySoon = document.getElementById('summary-soon');
    const summaryExpired = document.getElementById('summary-expired');

    const summaryActions = document.querySelectorAll('.summary-action');
    const inventoryListTitle = document.getElementById('inventory-list-title');
    const clearFilterButton = document.getElementById('clear-filter-button');

    const searchInput = document.getElementById('inventory-search');
    const clearSearchButton = document.getElementById('clear-search-button');
    const resultInfo = document.getElementById('inventory-result-info');

    const pageSize = 10;

    let currentItems = [];
    let currentFilter = 'all';
    let currentSearch = '';
    let currentPage = 1;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showMessage(message, isError = false) {
      formMessage.style.display = 'block';
      formMessage.textContent = message;
      formMessage.style.borderColor = isError
        ? 'rgba(255, 123, 138, 0.42)'
        : 'rgba(137, 204, 255, 0.18)';
      formMessage.style.color = isError ? '#ffe0e6' : '#b7d2e8';

      window.scrollTo({
        top: 0,
        behavior: 'smooth'
      });
    }

    function getDateStatus(item) {
      if (!item.expire_date) {
        return 'none';
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const soonLimit = new Date(today);
      soonLimit.setDate(soonLimit.getDate() + 30);

      const expireDate = new Date(item.expire_date);

      if (Number.isNaN(expireDate.getTime())) {
        return 'none';
      }

      expireDate.setHours(0, 0, 0, 0);

      if (expireDate < today) {
        return 'expired';
      }

      if (expireDate <= soonLimit) {
        return 'soon';
      }

      return 'normal';
    }

    function updateSummary(items) {
      const categories = items.reduce((set, item) => {
        const category = String(item.category || '未分类').trim() || '未分类';
        set.add(category);
        return set;
      }, new Set());

      const soonCount = items.filter(item => getDateStatus(item) === 'soon').length;
      const expiredCount = items.filter(item => getDateStatus(item) === 'expired').length;

      summaryTotal.textContent = items.length;
      summaryCategory.textContent = categories.size;
      summarySoon.textContent = soonCount;
      summaryExpired.textContent = expiredCount;
    }

    function getCategorySummary(items) {
      const map = items.reduce((result, item) => {
        const category = String(item.category || '未分类').trim() || '未分类';

        if (!result[category]) {
          result[category] = {
            category,
            count: 0,
            quantity: 0,
            units: new Set()
          };
        }

        result[category].count += 1;
        result[category].quantity += Number(item.quantity || 0);

        if (item.unit) {
          result[category].units.add(item.unit);
        }

        return result;
      }, {});

      return Object.values(map).map(group => ({
        ...group,
        units: Array.from(group.units).join(' / ') || '未填写'
      }));
    }

    function getBaseFilteredItems() {
      if (currentFilter === 'soon') {
        return currentItems.filter(item => getDateStatus(item) === 'soon');
      }

      if (currentFilter === 'expired') {
        return currentItems.filter(item => getDateStatus(item) === 'expired');
      }

      return currentItems;
    }

    function itemMatchesSearch(item, keyword) {
      if (!keyword) {
        return true;
      }

      const code = item.item_code || `LB-${String(item.id).padStart(5, '0')}`;

      const haystack = [
        code,
        item.name,
        item.category,
        item.quantity,
        item.unit,
        item.expire_date,
        item.note
      ]
        .map(value => String(value ?? '').toLowerCase())
        .join(' ');

      return haystack.includes(keyword.toLowerCase());
    }

    function getFilteredItems() {
      const baseItems = getBaseFilteredItems();

      return baseItems.filter(item => itemMatchesSearch(item, currentSearch));
    }

    function getPagedItems(items) {
      const totalPages = Math.max(1, Math.ceil(items.length / pageSize));

      if (currentPage > totalPages) {
        currentPage = totalPages;
      }

      if (currentPage < 1) {
        currentPage = 1;
      }

      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;

      return {
        totalPages,
        start,
        end,
        items: items.slice(start, end)
      };
    }

    function updateFilterUI() {
      summaryActions.forEach(button => {
        button.classList.toggle('active', button.dataset.filter === currentFilter);
      });

      const titleMap = {
        all: '当前库存：全部物资',
        category: '当前库存：分类汇总',
        soon: '当前库存：30天内过期',
        expired: '当前库存：已过期'
      };

      inventoryListTitle.textContent = titleMap[currentFilter] || '当前库存';
      clearFilterButton.style.display = currentFilter === 'all' ? 'none' : 'inline-flex';
    }

    function renderPagination(totalCount, totalPages, start, end) {
      const safeStart = totalCount === 0 ? 0 : start + 1;
      const safeEnd = Math.min(end, totalCount);

      return `
        <div class="pagination-bar">
          <div class="pagination-info">
            显示 ${safeStart}-${safeEnd} 条，共 ${totalCount} 条｜第 ${currentPage}/${totalPages} 页
          </div>

          <div class="pagination-buttons">
            <button class="small-button page-button" type="button" data-page-action="prev" ${currentPage <= 1 ? 'disabled' : ''}>
              上一页
            </button>

            <button class="small-button page-button" type="button" data-page-action="next" ${currentPage >= totalPages ? 'disabled' : ''}>
              下一页
            </button>
          </div>
        </div>
      `;
    }

    function renderCategorySummary() {
      const groups = getCategorySummary(currentItems).filter(group => {
        if (!currentSearch) {
          return true;
        }

        const haystack = [
          group.category,
          group.count,
          group.quantity,
          group.units
        ]
          .map(value => String(value ?? '').toLowerCase())
          .join(' ');

        return haystack.includes(currentSearch.toLowerCase());
      });

      const paged = getPagedItems(groups);

      if (!groups.length) {
        resultInfo.textContent = currentSearch
          ? `没有找到包含「${currentSearch}」的分类。`
          : '还没有分类数据。';

        list.innerHTML = '<p class="empty">没有符合条件的分类。</p>';
        return;
      }

      resultInfo.textContent = currentSearch
        ? `分类汇总搜索「${currentSearch}」，找到 ${groups.length} 个分类。`
        : `共 ${groups.length} 个分类。`;

      list.innerHTML = paged.items.map(group => `
        <article class="item-card">
          <div>
            <h3>${escapeHtml(group.category)}</h3>
            <p>共 ${escapeHtml(group.count)} 条记录</p>
          </div>

          <div>
            <p>数量合计：${escapeHtml(group.quantity)}</p>
            <p>涉及单位：${escapeHtml(group.units)}</p>
          </div>
        </article>
      `).join('') + renderPagination(groups.length, paged.totalPages, paged.start, paged.end);
    }

    function renderInventoryList() {
      updateFilterUI();

      if (currentFilter === 'category') {
        renderCategorySummary();
        return;
      }

      const filteredItems = getFilteredItems();
      const paged = getPagedItems(filteredItems);

      if (!filteredItems.length) {
        const emptyMap = {
          all: '还没有记录物资。',
          soon: '没有30天内过期的物资。',
          expired: '没有已过期的物资。'
        };

        resultInfo.textContent = currentSearch
          ? `没有找到包含「${currentSearch}」的物资。`
          : '没有符合条件的物资。';

        list.innerHTML = `<p class="empty">${emptyMap[currentFilter] || '没有符合条件的物资。'}</p>`;
        return;
      }

      const filterNameMap = {
        all: '全部物资',
        soon: '30天内过期',
        expired: '已过期'
      };

      resultInfo.textContent = currentSearch
        ? `${filterNameMap[currentFilter]}中搜索「${currentSearch}」，找到 ${filteredItems.length} 条。`
        : `${filterNameMap[currentFilter]}，共 ${filteredItems.length} 条。`;

      list.innerHTML = paged.items.map(item => {
        const id = Number(item.id);
        const code = escapeHtml(item.item_code || `LB-${String(id).padStart(5, '0')}`);
        const name = escapeHtml(item.name);
        const category = escapeHtml(item.category || '未分类');
        const quantity = escapeHtml(item.quantity ?? 0);
        const unit = escapeHtml(item.unit || '');
        const expireDate = escapeHtml(item.expire_date || '未填写');
        const note = escapeHtml(item.note || '');

        return `
          <article class="item-card">
            <div>
              <p class="item-code">${code}</p>
              <h3>${name}</h3>
              <p>${category} · ${quantity}${unit}</p>
            </div>

            <div>
              <p>过期：${expireDate}</p>
              <p>${note}</p>
              <button
                class="danger-button"
                type="button"
                data-id="${id}"
                data-name="${name}"
                data-code="${code}"
              >
                删除
              </button>
            </div>
          </article>
        `;
      }).join('') + renderPagination(filteredItems.length, paged.totalPages, paged.start, paged.end);
    }

    async function loadInventory() {
      try {
        const res = await fetch('/api/inventory');

        if (!res.ok) {
          throw new Error(`读取失败：${res.status}`);
        }

        currentItems = await res.json();

        updateSummary(currentItems);
        renderInventoryList();

      } catch (error) {
        console.error(error);
        currentItems = [];
        updateSummary([]);
        resultInfo.textContent = '库存读取失败。';
        list.innerHTML = '<p class="empty">库存读取失败，请检查后端服务是否正常。</p>';
      }
    }

    async function addInventory(payload) {
      const res = await fetch('/api/inventory', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const result = await res.json();

      if (!res.ok || result.ok === false) {
        throw new Error(result.message || '保存失败');
      }

      return result;
    }

    async function deleteInventory(id, name, code = '') {
      const label = code ? `${code}｜${name}` : name;
      const confirmed = confirm(`确定要删除「${label}」吗？`);

      if (!confirmed) {
        return;
      }

      try {
        const res = await fetch(`/api/inventory/${id}`, {
          method: 'DELETE'
        });

        const result = await res.json();

        if (!res.ok || result.ok === false) {
          throw new Error(result.message || '删除失败');
        }

        showMessage('物资已删除。');
        await loadInventory();

      } catch (error) {
        console.error(error);
        showMessage(error.message || '删除失败，请检查后端服务。', true);
      }
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(form);

      const payload = {
        name: String(formData.get('name') || '').trim(),
        category: String(formData.get('category') || '').trim(),
        quantity: Number(formData.get('quantity') || 0),
        unit: String(formData.get('unit') || '').trim(),
        expire_date: String(formData.get('expire_date') || '').trim(),
        note: String(formData.get('note') || '').trim()
      };

      if (!payload.name) {
        showMessage('名称不能为空。', true);
        return;
      }

      try {
        await addInventory(payload);

        form.reset();
        currentFilter = 'all';
        currentSearch = '';
        currentPage = 1;
        searchInput.value = '';

        showMessage('物资已记录。');
        await loadInventory();

      } catch (error) {
        console.error(error);
        showMessage(error.message || '保存失败，请检查后端服务。', true);
      }
    });

    list.addEventListener('click', (event) => {
      const pageButton = event.target.closest('.page-button');

      if (pageButton) {
        const action = pageButton.dataset.pageAction;

        if (action === 'prev') {
          currentPage -= 1;
        }

        if (action === 'next') {
          currentPage += 1;
        }

        renderInventoryList();
        return;
      }

      const deleteButton = event.target.closest('.danger-button');

      if (!deleteButton) {
        return;
      }

      const id = deleteButton.dataset.id;
      const name = deleteButton.dataset.name || '这条物资';
      const code = deleteButton.dataset.code || '';

      deleteInventory(id, name, code);
    });

    summaryActions.forEach(button => {
      button.addEventListener('click', () => {
        currentFilter = button.dataset.filter || 'all';
        currentPage = 1;
        renderInventoryList();
      });
    });

    clearFilterButton.addEventListener('click', () => {
      currentFilter = 'all';
      currentPage = 1;
      renderInventoryList();
    });

    searchInput.addEventListener('input', () => {
      currentSearch = searchInput.value.trim();
      currentPage = 1;
      renderInventoryList();
    });

    clearSearchButton.addEventListener('click', () => {
      currentSearch = '';
      currentPage = 1;
      searchInput.value = '';
      renderInventoryList();
    });

    backupButton.addEventListener('click', async () => {
      backupButton.disabled = true;
      backupButton.textContent = '备份中...';

      try {
        const res = await fetch('/api/backup', {
          method: 'POST'
        });

        const result = await res.json();

        if (!res.ok || result.ok === false) {
          throw new Error(result.message || '备份失败');
        }

        showMessage(`备份成功：${result.file}`);

      } catch (error) {
        console.error(error);
        showMessage(error.message || '备份失败，请检查后端服务。', true);

      } finally {
        backupButton.disabled = false;
        backupButton.textContent = '备份数据库';
      }
    });

    loadInventory();
  </script>
</body>
</html>
