<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiki 分类预览 - 壳中灯 LanternBox</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>

    .library-hero { margin-bottom: 20px; }
    .library-header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .library-header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .library-chip-button { min-height: 42px; padding: 10px 15px; border-radius: 14px; border: 1px solid rgba(137, 204, 255, 0.18); color: var(--text-main); background: rgba(255, 255, 255, 0.045); font-weight: 900; cursor: pointer; }
    .library-chip-button:hover { border-color: var(--border-strong); background: rgba(104, 199, 255, 0.1); }
    .library-chip-button:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; transform: none; }
    .library-search-panel, .library-section { margin-top: 16px; padding: 18px; border: 1px solid rgba(137, 204, 255, 0.14); border-radius: 22px; background: rgba(255, 255, 255, 0.045); }
    .library-search-row { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; gap: 10px; align-items: center; }
    .library-search-row input { width: 100%; min-height: 46px; padding: 11px 14px; border-radius: 14px; border: 1px solid rgba(137, 204, 255, 0.18); color: var(--text-main); background: rgba(0, 0, 0, 0.18); font-size: 15px; outline: none; }
    .library-search-row input:focus { border-color: var(--border-strong); box-shadow: 0 0 0 3px rgba(104, 199, 255, 0.08); }
    .library-section-title { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .library-section-title h2 { margin: 0; color: var(--text-main); font-size: 22px; }
    .library-section-title span { color: var(--text-muted); font-size: 14px; }
    .wiki-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    .wiki-card { min-width: 0; padding: 16px; border: 1px solid rgba(137, 204, 255, 0.14); border-radius: 18px; background: rgba(255, 255, 255, 0.045); cursor: pointer; text-align: left; }
    .wiki-card:hover { border-color: var(--border-strong); background: rgba(104, 199, 255, 0.1); }
    .wiki-card h3 { margin: 0 0 8px; color: var(--text-main); font-size: 18px; line-height: 1.45; }
    .wiki-card p { margin: 0 0 10px; color: var(--text-soft); font-size: 15px; line-height: 1.65; }
    .wiki-card small { display: block; color: var(--text-muted); font-size: 13px; line-height: 1.5; }
    .library-grid-two { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .library-info-card { min-width: 0; padding: 16px; border: 1px solid rgba(137, 204, 255, 0.14); border-radius: 18px; background: rgba(255, 255, 255, 0.035); }
    .library-info-card h3 { margin: 0 0 8px; color: var(--text-main); font-size: 18px; }
    .library-info-card p, .library-info-card li { color: var(--text-soft); font-size: 15px; line-height: 1.7; }
    .library-info-card ul { margin: 8px 0 0; padding-left: 20px; }
    .library-status-text { color: var(--text-muted); font-size: 14px; line-height: 1.6; }
    .library-empty { padding: 16px; border: 1px dashed rgba(137, 204, 255, 0.18); border-radius: 16px; color: var(--text-muted); background: rgba(255, 255, 255, 0.025); font-size: 15px; line-height: 1.6; }
    .wiki-modal-body-text { color: var(--text-soft); font-size: 16px; line-height: 1.85; }
    .wiki-modal-body-text h2, .wiki-modal-body-text h3, .wiki-modal-body-text h4 { margin: 18px 0 8px; color: var(--accent-bright); line-height: 1.45; }
    .wiki-modal-body-text p { margin: 0 0 10px; }
    .wiki-modal-body-text ul, .wiki-modal-body-text ol { margin: 6px 0 12px; padding-left: 24px; }
    .wiki-content-panel {
      padding: 0;
      overflow: hidden;
      border-radius: 18px;
    }

    .wiki-content-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid rgba(137, 204, 255, 0.16);
      background: rgba(255, 255, 255, 0.026);
    }

    .wiki-content-toolbar h3 {
      margin: 0;
      color: var(--accent-bright);
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: 0.02em;
    }

    .wiki-tts-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .wiki-tts-status {
      flex-basis: 100%;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.55;
      text-align: right;
    }

    .wiki-content-body {
      padding: 20px;
    }

    .wiki-modal-meta {
      display: grid;
      gap: 6px;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .wiki-modal-meta span {
      display: block;
    }

    @media (max-width: 760px) {
      .wiki-content-toolbar {
        grid-template-columns: 1fr;
        align-items: start;
      }

      .wiki-tts-actions {
        justify-content: flex-start;
      }

      .wiki-tts-status {
        text-align: left;
      }
    }
    .wiki-media-list { display: grid; gap: 14px; }
    .wiki-media-item, .wiki-media-file { overflow: hidden; border: 1px solid rgba(137, 204, 255, 0.14); border-radius: 16px; background: rgba(255, 255, 255, 0.045); }
    .wiki-media-item img, .wiki-media-item video { display: block; width: 100%; max-height: 420px; object-fit: contain; background: rgba(0, 0, 0, 0.18); }
    .wiki-media-item audio { width: 100%; padding: 12px; }
    .wiki-media-item figcaption, .wiki-media-caption { display: grid; gap: 4px; padding: 12px 14px; color: var(--text-soft); font-size: 14px; line-height: 1.6; }
    .wiki-media-file { padding: 14px; }
    .wiki-media-file a { color: var(--accent-bright); font-weight: 900; text-decoration: none; }
    @media (max-width: 900px) { .library-search-row, .library-grid-two { grid-template-columns: 1fr; } }


    .wiki-category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
    .wiki-category-card { min-width: 0; padding: 16px; border: 1px solid rgba(137, 204, 255, 0.14); border-radius: 18px; background: rgba(255, 255, 255, 0.045); cursor: pointer; text-align: left; transition: 0.2s ease; }
    .wiki-category-card:hover { border-color: var(--border-strong); background: rgba(104, 199, 255, 0.1); transform: translateY(-1px); }
    .wiki-category-card h3 { margin: 0 0 8px; color: var(--text-main); font-size: 18px; line-height: 1.45; }
    .wiki-category-card p { margin: 0; color: var(--text-soft); font-size: 14px; line-height: 1.6; }
    .wiki-category-count { display: inline-flex; margin-top: 12px; padding: 4px 10px; border-radius: 999px; background: rgba(104, 199, 255, 0.12); color: var(--accent-bright); font-size: 12px; font-weight: 900; }
    .wiki-pager { display: flex; align-items: center; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
    .wiki-page-info { color: var(--text-muted); font-size: 14px; font-weight: 800; }

    .library-search-row { grid-template-columns: minmax(0, 1fr) auto; }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero library-hero">
      <div class="library-header-row">
        <div>
          <p class="eyebrow">WIKI CATEGORIES</p>
          <h1>分类预览</h1>
          <p class="subtitle">按主题浏览本地 Wiki，每个分类下分页显示文章。</p>
        </div>
        <div class="library-header-actions">
          <a class="page-nav-button" href="/library.html">返回资料库</a>
          <a class="page-nav-button" href="/assistant.html">进入 AI 助手</a>
        </div>
      </div>
    </section>

    <section class="library-section">
      <div class="library-section-title">
        <h2>分类浏览</h2>
        <span id="wiki-category-count-label">正在读取分类...</span>
      </div>
      <div id="wiki-category-list" class="wiki-category-grid">
        <div class="library-empty">正在读取 Wiki 分类...</div>
      </div>
    </section>

    <section id="wiki-category-articles-section" class="library-section" style="display: none;">
      <div class="library-section-title">
        <h2 id="wiki-category-title">分类文章</h2>
        <span id="wiki-category-articles-count">每页 10 篇</span>
      </div>
      <div id="wiki-category-articles" class="wiki-grid"></div>
      <div id="wiki-category-pager" class="wiki-pager"></div>
    </section>


    <div id="guide-modal" class="guide-modal hidden">
      <div class="guide-modal-backdrop" onclick="closeGuideModal()"></div>
      <div class="guide-modal-card">
        <div class="guide-modal-header">
          <div>
            <p id="guide-modal-id" class="guide-modal-id"></p>
            <h2 id="guide-modal-title">Wiki 标题</h2>
            <p id="guide-modal-category" class="guide-modal-category"></p>
          </div>
          <button class="guide-modal-close" onclick="closeGuideModal()">关闭</button>
        </div>
        <div id="guide-modal-body" class="guide-modal-body"></div>
      </div>
    </div>

  </main>

  <script>
    const wikiCategoryList = document.getElementById('wiki-category-list');
    const wikiCategoryCountLabel = document.getElementById('wiki-category-count-label');
    const wikiCategoryArticlesSection = document.getElementById('wiki-category-articles-section');
    const wikiCategoryTitle = document.getElementById('wiki-category-title');
    const wikiCategoryArticlesCount = document.getElementById('wiki-category-articles-count');
    const wikiCategoryArticles = document.getElementById('wiki-category-articles');
    const wikiCategoryPager = document.getElementById('wiki-category-pager');

    let latestCategoryArticles = [];
    let currentCategoryId = null;
    let currentCategoryName = '';
    let currentCategoryPage = 1;
    const CATEGORY_PER_PAGE = 10;

    document.addEventListener('DOMContentLoaded', () => {
      loadWikiCategories();
    });

    async function loadWikiCategories() {
      wikiCategoryList.innerHTML = '<div class="library-empty">正在读取 Wiki 分类...</div>';
      wikiCategoryCountLabel.textContent = '正在读取分类...';

      try {
        const response = await fetch('/api/wiki/categories');
        if (!response.ok) throw new Error('Wiki 分类读取失败');
        const data = await response.json();
        const categories = Array.isArray(data.items) ? data.items : [];

        if (!categories.length) {
          wikiCategoryList.innerHTML = '<div class="library-empty">还没有 Wiki 分类。</div>';
          wikiCategoryCountLabel.textContent = '暂无分类';
          return;
        }

        wikiCategoryList.innerHTML = categories.map(category => `
          <article class="wiki-category-card" onclick="loadCategoryArticles('${escapeHtml(category.id)}', '${escapeHtml(category.name || '未命名分类')}', 1)">
            <h3>${escapeHtml(category.name || '未命名分类')}</h3>
            <p>${escapeHtml(category.description || '暂无分类说明。')}</p>
            <span class="wiki-category-count">点击查看文章</span>
          </article>
        `).join('');

        wikiCategoryCountLabel.textContent = `共 ${categories.length} 个分类`;
      } catch (error) {
        console.error(error);
        wikiCategoryList.innerHTML = '<div class="library-empty">分类读取失败，请确认后端接口正常。</div>';
        wikiCategoryCountLabel.textContent = '读取失败';
      }
    }

    async function loadCategoryArticles(categoryId, categoryName, page = 1) {
      currentCategoryId = categoryId;
      currentCategoryName = categoryName;
      currentCategoryPage = page;

      wikiCategoryArticlesSection.style.display = 'block';
      wikiCategoryTitle.textContent = categoryName;
      wikiCategoryArticlesCount.textContent = '正在读取分类文章...';
      wikiCategoryArticles.innerHTML = '<div class="library-empty">正在读取分类文章...</div>';
      wikiCategoryPager.innerHTML = '';

      try {
        const response = await fetch(`/api/wiki/categories/${encodeURIComponent(categoryId)}/articles?page=${page}&per_page=${CATEGORY_PER_PAGE}`);
        if (!response.ok) throw new Error('分类文章读取失败');
        const data = await response.json();
        const articles = Array.isArray(data.items) ? data.items : [];
        latestCategoryArticles = articles;
        latestWikiArticles = articles;

        if (!articles.length) {
          wikiCategoryArticles.innerHTML = '<div class="library-empty">这个分类下还没有已发布文章。</div>';
          wikiCategoryArticlesCount.textContent = '暂无文章';
          renderCategoryPager(data);
          return;
        }

        renderWikiList(wikiCategoryArticles, articles, 'openCategoryWikiArticle');
        wikiCategoryArticlesCount.textContent = `第 ${data.page || page} 页 / 共 ${data.totalItems || articles.length} 篇`;
        renderCategoryPager(data);
        wikiCategoryArticlesSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (error) {
        console.error(error);
        latestCategoryArticles = [];
        latestWikiArticles = [];
        wikiCategoryArticles.innerHTML = '<div class="library-empty">分类文章读取失败，请确认接口正常。</div>';
        wikiCategoryArticlesCount.textContent = '读取失败';
        wikiCategoryPager.innerHTML = '';
      }
    }

    function renderCategoryPager(data) {
      const page = data.page || currentCategoryPage || 1;
      const totalPages = data.totalPages || 1;
      const totalItems = data.totalItems || 0;

      if (totalPages <= 1) {
        wikiCategoryPager.innerHTML = totalItems ? `<span class="wiki-page-info">共 ${totalItems} 篇</span>` : '';
        return;
      }

      wikiCategoryPager.innerHTML = `
        <button class="library-chip-button" ${page <= 1 ? 'disabled' : ''} onclick="loadCategoryArticles(currentCategoryId, currentCategoryName, ${page - 1})" type="button">上一页</button>
        <span class="wiki-page-info">第 ${page} / ${totalPages} 页，共 ${totalItems} 篇</span>
        <button class="library-chip-button" ${page >= totalPages ? 'disabled' : ''} onclick="loadCategoryArticles(currentCategoryId, currentCategoryName, ${page + 1})" type="button">下一页</button>
      `;
    }

    function openCategoryWikiArticle(index) {
      const wiki = latestCategoryArticles[index];
      openWikiArticle(wiki);
    }


    let latestWikiArticles = [];
    let currentWikiSpeechText = '';
    let currentWikiContent = '';
    let currentAudio = null;
    let currentAudioSource = null;
    let audioContext = null;
    let isGeneratingSpeech = false;

    function renderWikiList(target, articles, openerName) {
      if (!Array.isArray(articles) || !articles.length) {
        target.innerHTML = '<div class="library-empty">没有找到 Wiki 条目。</div>';
        return;
      }

      target.innerHTML = articles.map((article, index) => `
        <article class="wiki-card" onclick="${openerName}(${index})">
          <h3>${escapeHtml(article.title || '未命名 Wiki')}</h3>
          <p>${escapeHtml(article.summary || '暂无摘要。')}</p>
          <small>${escapeHtml(article.source || '本地 Wiki')}</small>
        </article>
      `).join('');
    }

    async function openWikiArticleFromList(index) {
      const wiki = latestWikiArticles[index];
      await openWikiArticle(wiki);
    }

    async function openWikiArticle(wiki) {
      if (!wiki || !wiki.id) return;

      stopWikiSpeaking(false);
      currentWikiContent = '';

      const modal = document.getElementById('guide-modal');
      const modalId = document.getElementById('guide-modal-id');
      const modalTitle = document.getElementById('guide-modal-title');
      const modalCategory = document.getElementById('guide-modal-category');
      const modalBody = document.getElementById('guide-modal-body');

      modalId.textContent = wiki.id ? `WIKI · ${wiki.id}` : 'WIKI';
      modalTitle.textContent = wiki.title || '未命名 Wiki';
      modalCategory.textContent = '正在读取完整 Wiki 内容...';
      modalBody.innerHTML = `
        <section class="guide-modal-section">
          <h3>读取中</h3>
          <p>正在从本地 Wiki 读取完整内容。</p>
        </section>
      `;

      modal.classList.remove('hidden');
      document.body.classList.add('modal-open');

      try {
        const response = await fetch(`/api/wiki/articles/${encodeURIComponent(wiki.id)}`);
        if (!response.ok) throw new Error('Wiki 详情读取失败');
        const data = await response.json();
        if (!data.ok || !data.article) throw new Error(data.error || 'Wiki 文章不存在');

        const article = data.article;
        const media = Array.isArray(data.media) ? data.media : [];
        const riskLevel = article.risk_level || wiki.risk_level || 'normal';
        const source = article.source || wiki.source || '本地 Wiki';
        const tags = article.tags || wiki.tags || '';
        const content = article.content || wiki.content || '暂无正文。';
        currentWikiSpeechText = markdownToPlainText(content);
        currentWikiContent = content;

        modalId.textContent = article.id ? `WIKI · ${article.id}` : 'WIKI';
        modalTitle.textContent = article.title || wiki.title || '未命名 Wiki';
        modalCategory.classList.add('wiki-modal-meta');
        modalCategory.innerHTML = `
          <span>风险等级：${escapeHtml(riskLevel)}</span>
          <span>来源：${escapeHtml(source)}</span>
        `;
        modalBody.innerHTML = `
          ${renderGuideSection('摘要', article.summary || wiki.summary)}
          ${renderGuideSection('标签', tags)}
          <section class="guide-modal-section wiki-content-panel">
            <div class="wiki-content-toolbar">
              <h3>正文</h3>
              <div class="wiki-tts-actions">
                <button id="wiki-tts-button" class="library-chip-button" onclick="speakCurrentWikiContent()" type="button">开始朗读</button>
                <button class="library-chip-button" onclick="stopWikiSpeaking()" type="button">停止朗读</button>
                <span id="wiki-tts-status" class="wiki-tts-status">使用本地 TTS 引擎朗读正文。</span>
              </div>
            </div>
            <div class="wiki-content-body">
              <div class="wiki-modal-body-text">${renderSimpleMarkdown(content)}</div>
            </div>
          </section>
          ${renderWikiMedia(media)}
        `;

        requestAnimationFrame(() => { modalBody.scrollTop = 0; });
      } catch (error) {
        console.error(error);
        modalCategory.textContent = '读取失败';
        modalBody.innerHTML = `
          <section class="guide-modal-section">
            <h3>Wiki 详情读取失败</h3>
            <p>${escapeHtml(error.message || '请确认后端和 PocketBase 正常运行。')}</p>
          </section>
        `;
      }
    }

    function closeGuideModal() {
      stopWikiSpeaking(false);
      const modal = document.getElementById('guide-modal');
      modal.classList.add('hidden');
      document.body.classList.remove('modal-open');
    }

    function renderGuideSection(title, content) {
      if (!content) return '';
      return `
        <section class="guide-modal-section">
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(content)}</p>
        </section>
      `;
    }

    async function speakCurrentWikiContent() {
      await speakWikiText(currentWikiContent);
    }

    function stripMarkdownForSpeech(text) {
      return String(text || '')
        .replace(/```[\s\S]*?```/g, '')
        .replace(/^#{1,6}\s+/gm, '')
        .replace(/^[-*+]\s+/gm, '')
        .replace(/^\d+[.、]\s+/gm, '')
        .replace(/\[([^\]]+)\]\([^\)]+\)/g, '$1')
        .replace(/[*_`>]/g, '')
        .replace(/\n{3,}/g, '\n\n')
        .trim();
    }

    async function speakWikiText(text) {
      if (isGeneratingSpeech) return;

      const status = document.getElementById('wiki-tts-status');
      const button = document.getElementById('wiki-tts-button');
      let speechText = stripMarkdownForSpeech(text);

      if (!speechText) {
        if (status) status.textContent = '语音播报：没有可朗读的正文。';
        return;
      }

      if (status) {
        status.textContent = '语音播报：正在生成完整正文语音...';
      }

      isGeneratingSpeech = true;
      if (button) {
        button.disabled = true;
        button.textContent = '生成语音中...';
      }

      try {
        stopWikiSpeaking(false);

        const response = await fetch('/api/tts/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: speechText, mode: 'wiki' })
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(errText || '语音生成失败');
        }

        const data = await response.json();
        if (!data.audio_url) throw new Error('没有返回音频地址');

        await playWikiAudio(data.audio_url);
      } catch (error) {
        console.error(error);
        if (status) status.textContent = '语音播报：生成或播放失败。';
        alert('语音播报失败：' + error.message);
      } finally {
        isGeneratingSpeech = false;
        if (button) {
          button.disabled = false;
          button.textContent = '开始朗读';
        }
      }
    }

    async function playWikiAudio(audioUrl) {
      const status = document.getElementById('wiki-tts-status');
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;

      if (AudioContextClass) {
        try {
          if (!audioContext) audioContext = new AudioContextClass();
          if (audioContext.state === 'suspended') await audioContext.resume();

          const response = await fetch(audioUrl, { cache: 'no-store' });
          if (!response.ok) throw new Error('音频文件读取失败');

          const arrayBuffer = await response.arrayBuffer();
          const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
          stopWikiSpeaking(false);

          const source = audioContext.createBufferSource();
          source.buffer = audioBuffer;
          source.connect(audioContext.destination);
          currentAudioSource = source;

          source.onended = () => {
            if (currentAudioSource === source) currentAudioSource = null;
            if (status) status.textContent = '语音播报：播放完成。';
          };

          source.start(0);
          if (status) status.textContent = '语音播报：正在播放。';
          return;
        } catch (error) {
          console.warn('AudioContext 播放失败，改用 Audio 元素播放：', error);
        }
      }

      stopWikiSpeaking(false);
      currentAudio = new Audio(audioUrl);
      currentAudio.addEventListener('play', () => { if (status) status.textContent = '语音播报：正在播放。'; });
      currentAudio.addEventListener('ended', () => { if (status) status.textContent = '语音播报：播放完成。'; currentAudio = null; });
      currentAudio.addEventListener('error', () => { if (status) status.textContent = '语音播报：播放失败。'; currentAudio = null; });
      await currentAudio.play();
    }

    function stopWikiSpeaking(updateStatus = true) {
      if (currentAudioSource) {
        try { currentAudioSource.stop(); } catch (error) { console.warn('停止 AudioContext 播放失败：', error); }
        currentAudioSource = null;
      }

      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        currentAudio = null;
      }

      if (updateStatus) {
        const status = document.getElementById('wiki-tts-status');
        if (status) status.textContent = '语音播报：已停止。';
      }
    }

    function renderSimpleMarkdown(text) {
      const lines = String(text || '').split('\n');
      let html = '';
      let inUl = false;
      let inOl = false;

      function closeLists() {
        if (inUl) {
          html += '</ul>';
          inUl = false;
        }
        if (inOl) {
          html += '</ol>';
          inOl = false;
        }
      }

      function renderInlineMarkdown(value) {
        return escapeHtml(String(value || ''))
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`(.+?)`/g, '<code>$1</code>');
      }

      lines.forEach(rawLine => {
        const line = rawLine.trim();

        if (!line) {
          closeLists();
          return;
        }

        if (/^---+$/.test(line)) {
          closeLists();
          html += '<hr />';
          return;
        }

        if (line.startsWith('### ')) {
          closeLists();
          html += `<h4>${renderInlineMarkdown(line.slice(4).trim())}</h4>`;
          return;
        }

        if (line.startsWith('## ')) {
          closeLists();
          html += `<h3>${renderInlineMarkdown(line.slice(3).trim())}</h3>`;
          return;
        }

        if (line.startsWith('# ')) {
          closeLists();
          html += `<h2>${renderInlineMarkdown(line.slice(2).trim())}</h2>`;
          return;
        }

        const unorderedMatch = line.match(/^[-*]\s+(.+)$/);
        if (unorderedMatch) {
          if (!inUl) {
            closeLists();
            html += '<ul>';
            inUl = true;
          }
          html += `<li>${renderInlineMarkdown(unorderedMatch[1].trim())}</li>`;
          return;
        }

        const orderedMatch = line.match(/^(\d+)[.、]\s+(.+)$/);
        if (orderedMatch) {
          if (!inOl) {
            closeLists();
            html += '<ol>';
            inOl = true;
          }

          // Only render the item body inside <li>.
          // The browser supplies numbering, so "1. 1 ..." will not appear.
          html += `<li>${renderInlineMarkdown(orderedMatch[2].trim())}</li>`;
          return;
        }

        closeLists();
        html += `<p>${renderInlineMarkdown(line)}</p>`;
      });

      closeLists();
      return html;
    }

    function markdownToPlainText(markdown) {
      return String(markdown || '')
        .split('\n')
        .map(line => {
          let clean = line.trim();

          if (!clean) return '';

          clean = clean
            .replace(/^#{1,6}\s+/, '')
            .replace(/^[-*]\s+/, '')
            .replace(/^\d+[.、]\s+/, '')
            .replace(/\*\*(.+?)\*\*/g, '$1')
            .replace(/\*(.+?)\*/g, '$1')
            .replace(/`(.+?)`/g, '$1')
            .replace(/\[(.*?)\]\((.*?)\)/g, '$1')
            .replace(/<[^>]+>/g, '');

          return clean;
        })
        .filter(Boolean)
        .join('\n');
    }

    function renderWikiMedia(mediaList) {
      if (!Array.isArray(mediaList) || !mediaList.length) return '';
      const items = mediaList.map(media => {
        const type = media.media_type || 'document';
        const title = escapeHtml(media.title || '未命名附件');
        const desc = escapeHtml(media.description || '');
        const url = media.file_url || '';
        if (!url) return '';

        if (type === 'image' || type === 'diagram') {
          return `
            <figure class="wiki-media-item">
              <img src="${escapeHtml(url)}" alt="${title}" loading="lazy" />
              <figcaption><strong>${title}</strong>${desc ? `<span>${desc}</span>` : ''}</figcaption>
            </figure>
          `;
        }

        if (type === 'video') {
          return `
            <div class="wiki-media-item">
              <video controls preload="metadata"><source src="${escapeHtml(url)}" />当前浏览器不支持视频播放。</video>
              <div class="wiki-media-caption"><strong>${title}</strong>${desc ? `<span>${desc}</span>` : ''}</div>
            </div>
          `;
        }

        if (type === 'audio') {
          return `
            <div class="wiki-media-item">
              <audio controls preload="metadata" src="${escapeHtml(url)}"></audio>
              <div class="wiki-media-caption"><strong>${title}</strong>${desc ? `<span>${desc}</span>` : ''}</div>
            </div>
          `;
        }

        return `
          <div class="wiki-media-file">
            <a href="${escapeHtml(url)}" target="_blank" rel="noopener">${title}</a>
            ${desc ? `<p>${desc}</p>` : ''}
          </div>
        `;
      }).join('');

      return `
        <section class="guide-modal-section wiki-media-section">
          <h3>媒体与附件</h3>
          <div class="wiki-media-list">${items}</div>
        </section>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') closeGuideModal();
    });

  </script>
</body>
