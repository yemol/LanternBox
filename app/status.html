<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>系统自检 - 壳中灯</title>

  <link rel="icon" href="/static/assets/brand/lanternbox-icon-original.png" type="image/png" />
  <link rel="stylesheet" href="/static/style.css?v=brand-logo-webp-1" />

  <style>
    .status-grid {
      display: grid;
      gap: 14px;
    }

    .check-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 18px;
      border: 1px solid rgba(137, 204, 255, 0.14);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.045);
    }

    .check-card h3 {
      margin: 0 0 8px;
      color: var(--text-main);
      font-size: 19px;
      line-height: 1.4;
    }

    .check-card p {
      margin: 0;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.65;
    }

    .check-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(137, 204, 255, 0.22);
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.045);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .check-badge.ok {
      color: #dff4ff;
      border-color: rgba(104, 199, 255, 0.38);
      background: rgba(104, 199, 255, 0.14);
    }

    .check-badge.fail {
      color: #ffdfe5;
      border-color: rgba(255, 123, 138, 0.38);
      background: rgba(255, 123, 138, 0.14);
    }

    .check-badge.loading {
      color: #ffe8c9;
      border-color: rgba(255, 183, 92, 0.34);
      background: rgba(255, 159, 67, 0.12);
    }

    .system-check-summary {
      margin-bottom: 14px;
      padding: 16px 18px;
      border: 1px solid rgba(137, 204, 255, 0.14);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--text-soft);
      line-height: 1.7;
    }

    .system-check-summary strong {
      color: var(--text-main);
    }

    .status-actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 760px) {
      .check-card {
        grid-template-columns: 1fr;
      }

      .check-badge {
        justify-self: start;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="hero compact-hero">
      <div class="page-header-row">
        <div>
          <p class="eyebrow">SYSTEM CHECK</p>
          <h1 class="brand-title"><img class="brand-mark-inline" src="/static/assets/brand/lanternbox-icon-original.webp" alt="" />系统自检</h1>
          <p class="subtitle">检查壳中灯核心模块是否在线。先确认火苗，再继续添柴。</p>
        </div>

        <div class="page-actions">
          <a class="page-nav-button" href="/">返回总览</a>
          <a class="page-nav-button" href="/assistant.html">进入 AI 助手</a>
        </div>
      </div>
    </section>

    <section class="list-section">
      <div class="section-title-row">
        <h2>核心模块状态</h2>
        <button class="small-button" type="button" onclick="runChecks()">重新自检</button>
      </div>

      <div id="system-check-summary" class="system-check-summary">
        正在等待系统自检报告。
      </div>

      <div id="status-grid" class="status-grid"></div>

      <div class="status-actions">
        <button class="small-button" type="button" onclick="location.href='/emergency'">查看应急指南</button>
        <button class="small-button" type="button" onclick="location.href='/library.html'">查看离线资料库</button>
        <button class="small-button" type="button" onclick="location.href='/inventory'">查看物资库存</button>
        <button class="small-button" type="button" onclick="location.href='/journal'">查看日记记录</button>
      </div>
    </section>
  </main>

  <script>
    const statusGrid = document.getElementById("status-grid");
    const summaryBox = document.getElementById("system-check-summary");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderLoadingCard() {
      return `
        <article class="check-card">
          <div>
            <h3>系统自检</h3>
            <p>正在读取后端统一体检报告...</p>
          </div>
          <span class="check-badge loading">检测中</span>
        </article>
      `;
    }

    function renderCheckCard(check) {
      const status = check.ok ? "ok" : "fail";
      const badgeText = check.ok ? "正常" : "异常";

      return `
        <article class="check-card" id="check-${escapeHtml(check.id || '')}">
          <div>
            <h3>${escapeHtml(check.title || "未命名模块")}</h3>
            <p>${escapeHtml(check.message || "无状态信息")}</p>
          </div>
          <span class="check-badge ${escapeHtml(status)}">${escapeHtml(badgeText)}</span>
        </article>
      `;
    }

    function renderFailedReport(error) {
      return `
        <article class="check-card">
          <div>
            <h3>系统自检失败</h3>
            <p>${escapeHtml(error.message || "无法读取 /api/system/check")}</p>
          </div>
          <span class="check-badge fail">异常</span>
        </article>
      `;
    }

    function updateSummary(data, checks) {
      const okCount = checks.filter(item => item.ok).length;
      const failCount = checks.length - okCount;
      const checkedAt = data.checked_at || "未知时间";

      summaryBox.innerHTML = `
        <strong>自检时间：</strong>${escapeHtml(checkedAt)}｜
        <strong>正常：</strong>${escapeHtml(okCount)} 项｜
        <strong>异常：</strong>${escapeHtml(failCount)} 项
      `;
    }

    async function runChecks() {
      summaryBox.textContent = "正在读取系统自检报告...";
      statusGrid.innerHTML = renderLoadingCard();

      try {
        const response = await fetch("/api/system/check", {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const checks = Array.isArray(data.checks) ? data.checks : [];

        if (!checks.length) {
          throw new Error("后端没有返回检查项目");
        }

        updateSummary(data, checks);
        statusGrid.innerHTML = checks.map(renderCheckCard).join("");

      } catch (error) {
        console.error("系统自检失败：", error);
        summaryBox.innerHTML = "<strong>自检失败：</strong>无法读取后端统一体检报告。";
        statusGrid.innerHTML = renderFailedReport(error);
      }
    }

    runChecks();
  </script>
</body>
</html>
